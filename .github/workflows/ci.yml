name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/chornolis_ci
      BOT_TOKEN: 000000:test-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate planning exports
        run: |
          npm run planning:export
          git diff --exit-code -- docs/planning/exports/items.json docs/planning/exports/issues.csv

      - name: Test
        env:
          TEST_JOBS: 4
        run: npm test

      - name: Typecheck
        run: npm run typecheck
