name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      title:
        description: "Changelog title / release summary"
        required: false
        default: "Release"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/chornolis_release
      BOT_TOKEN: 000000:test-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build before release
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        run: |
          npm version "${{ inputs.release_type }}" --no-git-tag-version
          echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Update changelog
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [ -n "$LATEST_TAG" ]; then
            COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -n 20)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- ${{ inputs.title }}"
          fi

          {
            echo "# Changelog"
            echo "All notable changes to this project will be documented in this file."
            echo
            echo "---"
            echo
            echo "## [$VERSION] - $DATE"
            echo
            echo "### Changed"
            echo "$COMMITS"
            echo
            if [ -f CHANGELOG.md ]; then
              tail -n +2 CHANGELOG.md | sed '1{/^All notable changes/d;}' | sed '1{/^$/d;}'
            fi
          } > CHANGELOG.new.md

          mv CHANGELOG.new.md CHANGELOG.md

      - name: Commit and tag release
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:main
          git push origin "v$VERSION"
